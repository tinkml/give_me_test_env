name: stands-bot

services:
  stands-bot-postgres:
    image: postgres:18-alpine
    restart: on-failure
    env_file:
      - ../.env
    volumes:
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 3s
      timeout: 20s
      retries: 3

  stands-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: on-failure
    env_file:
      - ../.env
    depends_on:
      stands-bot-postgres:
        condition: service_healthy

volumes:
  pg-data:
