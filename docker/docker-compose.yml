name: stands-bot

services:
  postgres:
    image: postgres:18-alpine
    restart: on-failure
    env_file:
      - ../.env
    ports:
      - 5432:5432
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 3s
      timeout: 20s
      retries: 3

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: on-failure
    env_file:
      - ../.env
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data: